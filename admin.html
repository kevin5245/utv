<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoonTVPlus 管理后台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    .status-online { color: green; font-weight: bold; }
    .status-offline { color: red; font-weight: bold; }
    .status-unknown { color: gray; }
    .action-bar { margin-bottom: 2rem; }
  </style>
</head>
<body>
  <main class="container">
    <h2>MoonTVPlus 直播源管理</h2>
    
    <article>
      <header>订阅与数据</header>
      <p>M3U 格式：<a href="/playlist.m3u" target="_blank" id="m3u-link">/playlist.m3u</a></p>
      <p>TXT 格式：<a href="/playlist.txt" target="_blank" id="txt-link">/playlist.txt</a></p>
      <hr>
      <div class="grid action-bar">
        <button class="secondary" onclick="exportData()">⬇️ 导出配置 (JSON)</button>
        <button class="secondary" onclick="document.getElementById('import-file').click()">⬆️ 导入配置 (JSON)</button>
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
      </div>
    </article>

    <article>
      <header>添加/修改频道</header>
      <form id="channel-form">
        <div class="grid">
          <input type="text" id="name" placeholder="频道名称 (如: 张大仙)" required>
          <select id="platform" required>
            <option value="" disabled selected>选择平台</option>
            <option value="huya">虎牙</option>
            <option value="bilibili">B站</option>
            <option value="douyin">抖音</option>
          </select>
          <input type="text" id="roomId" placeholder="房间号" required>
          <input type="text" id="group" placeholder="分组 (如: 游戏)" required>
          <select id="playMode" required>
            <option value="proxy" selected>服务器代理</option>
            <option value="direct">直连(302跳转)</option>
          </select>
        </div>
        <button type="submit">保存频道</button>
      </form>
    </article>

    <article>
      <header>频道列表</header>
      <table role="grid">
        <thead>
          <tr>
            <th>名称</th>
            <th>平台</th>
            <th>房间号</th>
            <th>分组</th>
            <th>模式</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="channel-list"></tbody>
      </table>
    </article>
  </main>

  <script>
    let state = { channels: [], settings: { intervalMinutes: 10 } };
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const tokenQuery = token ? `?token=${token}` : '';
    
    if (token) {
      document.getElementById('m3u-link').href = `/playlist.m3u${tokenQuery}`;
      document.getElementById('txt-link').href = `/playlist.txt${tokenQuery}`;
    }

    async function loadData() {
      const res = await fetch(`/api/config${tokenQuery}`);
      if (!res.ok) return alert('无法获取数据，可能未授权');
      state = await res.json();
      renderTable();
    }

    async function saveData() {
      await fetch(`/api/config${tokenQuery}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      loadData();
    }

    function renderTable() {
      const tbody = document.getElementById('channel-list');
      tbody.innerHTML = '';
      state.channels.forEach((ch, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${ch.name}</td>
          <td>${ch.platform}</td>
          <td>${ch.roomId}</td>
          <td>${ch.group}</td>
          <td><span style="color: ${ch.playMode === 'direct' ? '#10b981' : '#3b82f6'}">${ch.playMode === 'direct' ? '直连' : '代理'}</span></td>
          <td class="status-${ch.status || 'unknown'}">${ch.status === 'online' ? '在线' : (ch.status === 'offline' ? '离线' : '检测中')}</td>
          <td><a href="#" onclick="deleteChannel(${index})" style="color:red;">删除</a></td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('channel-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const newChannel = {
        name: document.getElementById('name').value,
        platform: document.getElementById('platform').value,
        roomId: document.getElementById('roomId').value,
        group: document.getElementById('group').value,
        playMode: document.getElementById('playMode').value,
        status: 'unknown'
      };
      
      const existIdx = state.channels.findIndex(c => c.platform === newChannel.platform && c.roomId === newChannel.roomId);
      if (existIdx >= 0) state.channels[existIdx] = newChannel;
      else state.channels.push(newChannel);
      
      saveData();
      e.target.reset();
    });

    window.deleteChannel = (index) => {
      if (confirm('确认删除?')) {
        state.channels.splice(index, 1);
        saveData();
      }
    };

    // ==== 新增：导出数据 ====
    window.exportData = () => {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "moontv_backup.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    };

    // ==== 新增：导入数据 ====
    window.importData = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedState = JSON.parse(e.target.result);
          if (!importedState.channels || !Array.isArray(importedState.channels)) {
            throw new Error("无效的配置文件格式");
          }
          if (confirm('⚠️ 导入将覆盖当前的频道列表，是否确认继续？')) {
            state = importedState;
            saveData();
            alert('✅ 导入成功！');
          }
        } catch (err) {
          alert('❌ 导入失败: ' + err.message);
        }
        event.target.value = ''; // 清空选择，允许重复导入同一文件
      };
      reader.readAsText(file);
    };

    loadData();
  </script>
</body>
</html>
